name: Scraper diario de noticias

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 UTC = 9:00 España (invierno) / 8:00 (verano)
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    contents: write
    issues: write 

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historial completo para los commits

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache de dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Regenerar archivos estáticos
        run: python build_index.py

      - name: Publicar cambios
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Actualización automática ${{ env.fecha }}"
          file_pattern: 'docs/content/**/*.md docs/index.json docs/sitemap.xml docs/feed.xml run_log.txt'
        env:
          fecha: ${{ steps.date.outputs.date }}

      - name: Notificar si hay errores
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Fallo en el scraper — ${new Date().toLocaleDateString('es-ES')}`,
              body: `El workflow de scraping falló el ${new Date().toISOString()}.\n\nRevisa los [logs del Action](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['bug', 'automated']
            })
